      qaFocusPendingEl = document.createElement('div');
      qaFocusPendingEl.className = 'web-pending';
      qaFocusPendingEl.textContent = 'Thinking…';
      const wrapper = qaFocusTurns.querySelector('.web-thread') || qaFocusTurns;
      wrapper.appendChild(qaFocusPendingEl);
      qaFocusTurns.scrollTop = qaFocusTurns.scrollHeight;
      // mirror pending in panel card
      const entry = webThreads.get(tid);
      if (entry) {
        if (entry.pendingEl) entry.pendingEl.remove();
        const p = document.createElement('div');
        p.className = 'web-pending';
        p.textContent = 'Thinking…';
        entry.turnsEl.appendChild(p);
        entry.pendingEl = p;
      }
    }

    document.getElementById('qa-focus-close-btn').addEventListener('click', closeFocusModal);
    document.getElementById('qa-focus-cancel-btn').addEventListener('click', closeFocusModal);
    document.getElementById('qa-focus-send-btn').addEventListener('click', submitFocusFollowup);
    qaFocusInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        submitFocusFollowup();
      }
    });
    qaFocusOverlay.addEventListener('click', e => {
      if (e.target === qaFocusOverlay) closeFocusModal();
    });

    // ── Profile prompts modal ────────────────────────────────────────────────
    const promptsModal       = document.getElementById('prompts-modal-overlay');
    const promptsProfileEl   = document.getElementById('prompts-modal-profile');
    const promptsAdvisorEl   = document.getElementById('prompts-advisor-text');
    const promptsAdvisorPath = document.getElementById('prompts-advisor-path');
    const promptsBackstoryEl = document.getElementById('prompts-backstory-text');
    const promptsBackstoryPath = document.getElementById('prompts-backstory-path');

    function openPromptsModal() {
      promptsAdvisorEl.textContent = '(loading…)';
      promptsAdvisorPath.textContent = '';
      promptsBackstoryEl.textContent = '(loading…)';
      promptsBackstoryPath.textContent = '';
      promptsModal.classList.add('open');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'get_prompts' }));
      }
    }

    let promptsBackstoryOriginal = '';
    const promptsBackstoryStatus = document.getElementById('prompts-backstory-status');

    function setBackstoryStatus(text, cls) {
      promptsBackstoryStatus.textContent = text || '';
      promptsBackstoryStatus.className = 'prompt-save-status' + (cls ? ' ' + cls : '');
    }

    function renderPromptsModal(msg) {
      promptsProfileEl.textContent = msg.profile || '(unknown)';
      // advisor section (read-only)
      if (!msg.advisor) {
        promptsAdvisorEl.textContent = '(no advisor configured for this profile)';
        promptsAdvisorPath.textContent = '';
      } else if (msg.advisor.missing) {
        promptsAdvisorEl.textContent = '(file not found)';
        promptsAdvisorPath.textContent = msg.advisor.path || '';
      } else if (msg.advisor.error) {
        promptsAdvisorEl.textContent = '(error reading file: ' + msg.advisor.error + ')';
        promptsAdvisorPath.textContent = msg.advisor.path || '';
      } else {
        promptsAdvisorEl.textContent = msg.advisor.text || '(empty)';
        promptsAdvisorPath.textContent = msg.advisor.path || '';
      }
      // backstory section (editable)
      const bs = msg.backstory;
      let initial = '';
      if (!bs) {
        promptsBackstoryPath.textContent = '(no backstory path for this profile)';
      } else if (bs.missing) {
        initial = '';
        promptsBackstoryPath.textContent = bs.path + ' (will be created on save)';
      } else if (bs.error) {
        promptsBackstoryPath.textContent = bs.path + ' — error: ' + bs.error;
      } else {
        initial = bs.text || '';
        promptsBackstoryPath.textContent = bs.path || '';
      }
      promptsBackstoryEl.value = initial;
      promptsBackstoryOriginal = initial;
      setBackstoryStatus('', '');
    }

    document.getElementById('prompts-backstory-text').addEventListener('input', () => {
      if (promptsBackstoryEl.value !== promptsBackstoryOriginal) {
        setBackstoryStatus('unsaved', 'dirty');
      } else {
        setBackstoryStatus('', '');
      }
    });
    document.getElementById('prompts-backstory-revert').addEventListener('click', () => {
      promptsBackstoryEl.value = promptsBackstoryOriginal;
      setBackstoryStatus('', '');
    });
    document.getElementById('prompts-backstory-save').addEventListener('click', () => {
      if (!(ws && ws.readyState === WebSocket.OPEN)) return;
      setBackstoryStatus('saving…', 'dirty');
      ws.send(JSON.stringify({ type: 'save_backstory', text: promptsBackstoryEl.value }));
    });

    profileNameEl.addEventListener('click', openPromptsModal);
    document.getElementById('prompts-close-btn').addEventListener('click', () => {
      promptsModal.classList.remove('open');
    });
    promptsModal.addEventListener('click', e => {
      if (e.target === promptsModal) promptsModal.classList.remove('open');
    });

    // ── Term lookup (FORMATTED panel decoration + popover + toggle) ──────────
    const termsToggleBtn  = document.getElementById('terms-toggle-btn');
    const termActiveEl    = document.getElementById('term-lookup-active');
    const termPopover     = document.getElementById('term-popover');
    const termPopoverTerm = document.getElementById('term-popover-term');
    const termPopoverDef  = document.getElementById('term-popover-def');
    const termPopoverSrc  = document.getElementById('term-popover-sources');
    const termCache       = new Map();   // lowercased term -> {term, definition, sources, ts}
    let   termLookupEnabled = false;

    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function setTermsToggleVisual(on) {
      termLookupEnabled = !!on;
      termsToggleBtn.classList.toggle('active', termLookupEnabled);
      termsToggleBtn.textContent = termLookupEnabled ? 'TERMS ON' : 'TERMS OFF';
      if (termLookupEnabled && termCache.size === 0) {
        // First time enabled this session — show a "waiting" message so it
        // doesn't look broken until the first paragraph finalizes and scans.
        termActiveEl.textContent = 'scanning new paragraphs…';
        termActiveEl.classList.add('active');
      } else if (!termLookupEnabled) {
        setActiveLookup('');
      }
    }

    termsToggleBtn.addEventListener('click', () => {
      const next = !termLookupEnabled;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'set_term_lookup_enabled', enabled: next }));
      }
      setTermsToggleVisual(next);  // optimistic; server will confirm
    });

    function setActiveLookup(term) {
      if (term) {
        termActiveEl.textContent = 'Looking up: ' + term;
        termActiveEl.classList.add('active');
      } else {
        termActiveEl.classList.remove('active');
        termActiveEl.textContent = '';
      }
    }

    // Walk text nodes inside `root` and wrap occurrences of `term` (whole word,
    // case-insensitive) in <span class="term-decorated" data-term="...">. Skips
    // text already inside decorated spans to avoid double-wrapping.
    function decorateTermInRoot(root, surface, key) {
      const re = new RegExp('\\b' + escapeRegex(surface) + '\\b', 'gi');
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode: (node) => {
          let p = node.parentElement;
          while (p && p !== root) {
            if (p.classList && p.classList.contains('term-decorated')) {
              return NodeFilter.FILTER_REJECT;
            }
            p = p.parentElement;
          }
          return NodeFilter.FILTER_ACCEPT;
        },
      });
      const hits = [];
      let node;
      while ((node = walker.nextNode())) {
        const text = node.textContent;
        let m;
        re.lastIndex = 0;
        while ((m = re.exec(text)) !== null) {
          hits.push({ node, start: m.index, end: m.index + m[0].length });
        }
      }
      // process in reverse so earlier indices remain valid
      hits.reverse().forEach(h => {
        try {
          const range = document.createRange();
          range.setStart(h.node, h.start);
          range.setEnd(h.node, h.end);
          const span = document.createElement('span');
          span.className = 'term-decorated';
          span.dataset.termKey = key;
          range.surroundContents(span);
        } catch (_) { /* range may straddle nodes — skip */ }
      });
    }

    function decorateAllForTerm(entry) {
      const key = (entry.term || '').toLowerCase();
      if (!key) return;
      const surface = entry.surface || entry.term;
      const paras = textContent.querySelectorAll('p.finalized, p.current');
      paras.forEach(p => decorateTermInRoot(p, surface, key));
    }

    function redecorateAllParagraphs() {
      // strip existing decorations
      textContent.querySelectorAll('.term-decorated').forEach(s => {
        const parent = s.parentNode;
        if (!parent) return;
        while (s.firstChild) parent.insertBefore(s.firstChild, s);
        parent.removeChild(s);
        parent.normalize();
      });
      // re-apply for every cached term
      termCache.forEach(entry => decorateAllForTerm(entry));
    }

    function showTermPopover(spanEl, entry) {
      termPopoverTerm.textContent = entry.term || '';
      const defText = entry.definition || '(no definition yet)';
      const html = renderAnswerHTML(defText, entry.sources || []);
      if (html !== null) {
        termPopoverDef.innerHTML = html;
      } else {
        termPopoverDef.textContent = defText;
      }
      termPopoverSrc.innerHTML = '';
      if (entry.sources && entry.sources.length) {
        const lbl = document.createElement('span');
        lbl.textContent = 'Sources: ';
        lbl.style.color = '#4a8a82';
        termPopoverSrc.appendChild(lbl);
        entry.sources.forEach((s, i) => {
          const a = document.createElement('a');
          a.href = s.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = `[${i + 1}] ${(s.title || s.url).slice(0, 60)}`;
          termPopoverSrc.appendChild(a);
        });
      }
      // position near the clicked term
      const r = spanEl.getBoundingClientRect();
      termPopover.classList.add('open');
      const popH = termPopover.offsetHeight;
      const popW = termPopover.offsetWidth;
      let top  = r.bottom + 6;
      let left = r.left;
      if (top + popH > window.innerHeight - 12) top = r.top - popH - 6;
      if (left + popW > window.innerWidth  - 12) left = window.innerWidth - popW - 12;
      if (left < 12) left = 12;
      termPopover.style.top  = top  + 'px';
      termPopover.style.left = left + 'px';
    }

    function hideTermPopover() { termPopover.classList.remove('open'); }
    document.getElementById('term-popover-close').addEventListener('click', hideTermPopover);

    // delegate click on the FORMATTED panel for decorated terms
    textContent.addEventListener('click', (e) => {
      const span = e.target.closest('.term-decorated');
      if (span) {
        const key = span.dataset.termKey;
        const entry = termCache.get(key);
        if (entry) {
          e.stopPropagation();
          showTermPopover(span, entry);
        }
      }
    });
    document.addEventListener('click', (e) => {
      if (termPopover.classList.contains('open')
          && !e.target.closest('#term-popover')
          && !e.target.closest('.term-decorated')) {
        hideTermPopover();
      }
    });

    // ── CLEAR session ────────────────────────────────────────────────────────
    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!confirm('Clear all session data? This cannot be undone.')) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'clear_session' }));
      }
    });

    // ── Per-panel clears ─────────────────────────────────────────────────────
    document.getElementById('nudge-btn').addEventListener('click', (e) => {
      const btn = e.currentTarget;
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'trigger_advisor' }));
      btn.disabled = true;
      const prev = btn.textContent;
      btn.textContent = 'NUDGED';
      setTimeout(() => { btn.disabled = false; btn.textContent = prev; }, 2500);
    });
    document.getElementById('clear-live-notes-btn').addEventListener('click', () => {
      if (!confirm('Clear all LIVE NOTES content? (Transcript and Q&A are kept.)')) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'clear_live_notes' }));
      }
    });
    document.getElementById('clear-qa-btn').addEventListener('click', () => {
      if (!confirm('Clear all Q&A threads? (Transcript and LIVE NOTES are kept.)')) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'clear_qa' }));
      }
    });

    connect();
  </script>
</body>
</html>
